<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prix Net Rendu — Pharmacie Michelet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F3EE; --surface: #FFFFFF; --border: #E2DED6;
      --text: #1A1916; --muted: #8A857C;
      --accent: #2D5016; --accent-light: #EDF2E6; --accent-mid: #4A7A24;
      --danger: #8B1A1A;
      --mono: 'DM Mono', monospace; --serif: 'Instrument Serif', serif; --sans: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
    header { border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; display: flex; align-items: baseline; gap: 1rem; background: var(--surface); }
    .logo { font-family: var(--serif); font-size: 22px; color: var(--accent); letter-spacing: -0.01em; }
    .logo-sub { font-size: 12px; color: var(--muted); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; }
    main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }
    .page-title { font-family: var(--serif); font-size: 30px; color: var(--text); margin-bottom: 0.25rem; letter-spacing: -0.02em; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
    .drop-zone { border: 1.5px dashed var(--border); border-radius: 12px; padding: 3rem 2rem; text-align: center; cursor: pointer; background: var(--surface); transition: all 0.18s; }
    .drop-zone:hover, .drop-zone.dragging { border-color: var(--accent-mid); background: var(--accent-light); }
    .drop-icon { width: 52px; height: 52px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 22px; }
    .drop-title { font-size: 15px; font-weight: 500; margin-bottom: 0.3rem; }
    .drop-sub { font-size: 12px; color: var(--muted); margin-bottom: 0; }
    input[type="file"] { display: none; }
    .file-pill { display: inline-flex; align-items: center; gap: 8px; background: var(--accent-light); border: 1px solid #C5D9A8; border-radius: 8px; padding: 0.6rem 1rem; font-size: 13px; color: var(--accent); margin-top: 1.25rem; font-family: var(--mono); }
    .remove-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; padding: 0 2px; transition: color 0.1s; }
    .remove-btn:hover { color: var(--danger); }
    .btn-primary { margin-top: 1.5rem; width: 100%; height: 46px; border-radius: 8px; border: none; background: var(--accent); color: white; font-size: 14px; font-weight: 500; font-family: var(--sans); cursor: pointer; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .loader { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.35); border-top-color: white; border-radius: 50%; animation: spin 0.65s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-line { margin-top: 0.75rem; font-size: 12px; color: var(--muted); text-align: center; font-family: var(--mono); min-height: 18px; }
    .error-line { color: var(--danger); font-size: 13px; margin-top: 0.5rem; text-align: center; }
    .results { margin-top: 2.5rem; }
    .section-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.75rem; }
    .invoice-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; }
    .meta-cell { background: var(--surface); padding: 0.875rem 1rem; }
    .meta-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; }
    .meta-value { font-size: 13px; font-weight: 500; }
    .frais-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .frais-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.6rem; }
    .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; }
    .chip-amount { font-family: var(--mono); font-weight: 500; color: var(--accent-mid); }
    .controls-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .ctrl-label { font-size: 12px; color: var(--muted); font-family: var(--mono); }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    thead { background: var(--bg); border-bottom: 1px solid var(--border); }
    th { padding: 10px 12px; text-align: left; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); white-space: nowrap; font-weight: 400; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFAF8; }
    .td-r { text-align: right; } .th-r { text-align: right; }
    .ean-badge { font-family: var(--mono); font-size: 10px; background: #EEF4FF; color: #2D4A8A; border: 1px solid #C8D8F5; padding: 2px 6px; border-radius: 4px; }
    .ref-text { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
    .pct-cell { color: var(--muted); }
    .pct-bar-bg { background: var(--bg); border-radius: 2px; height: 3px; margin-top: 4px; min-width: 50px; }
    .pct-bar { background: var(--accent-mid); height: 3px; border-radius: 2px; }
    .net-val { font-family: var(--mono); font-weight: 500; color: var(--accent); font-size: 13px; }
    .net-total { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 1.5rem; }
    .sum-card { background: var(--surface); padding: 1rem 1.25rem; }
    .sum-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
    .sum-value { font-family: var(--mono); font-size: 18px; font-weight: 500; }
    .sum-value.accent { color: var(--accent); }
    .ctrl-ok { font-size: 11px; font-family: var(--mono); padding: 3px 8px; border-radius: 4px; }
    .ctrl-ok.ok { background: var(--accent-light); color: var(--accent); }
    .ctrl-ok.warn { background: #FFF3CD; color: #856404; }
    .note { font-size: 11px; color: var(--muted); text-align: right; margin-top: 0.6rem; font-style: italic; }
    .no-frais-note { font-size: 12px; color: var(--muted); font-style: italic; }
    .controls-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; margin-bottom: 1.5rem; }
    @media (max-width: 600px) { main { padding: 1.5rem 1rem; } .summary-grid { grid-template-columns: repeat(2, 1fr); } header { padding: 1rem; } }
  </style>
</head>
<body>
<header>
  <span class="logo">Pharmacie Michelet</span>
  <span class="logo-sub">Prix Net Rendu</span>
</header>
<main>
  <h1 class="page-title">Calcul du prix net rendu</h1>
  <p class="page-sub">Importez une facture fournisseur — les frais annexes sont détectés et répartis au prorata du montant HT. Les remises déjà intégrées ne sont pas retraitées.</p>
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📄</div>
    <div class="drop-title">Importer la facture</div>
    <div class="drop-sub">Glissez-déposez ou cliquez — PDF, JPG, PNG acceptés</div>
    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png">
  </div>
  <div id="fileInfo"></div>
  <button class="btn-primary" id="btnAnalyze" onclick="analyze()" disabled>Calculer le prix net rendu</button>
  <div class="status-line" id="status"></div>
  <div class="error-line" id="errorMsg"></div>
  <div class="results" id="results" style="display:none"></div>
</main>
<script>
  const PROXY_URL = '/api/analyze';
  const MODEL = 'claude-sonnet-4-20250514';
  let fileData = null, fileType = null;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  dropZone.onclick = () => fileInput.click();
  dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('dragging'); };
  dropZone.ondragleave = () => dropZone.classList.remove('dragging');
  dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('dragging'); handleFile(e.dataTransfer.files[0]); };
  fileInput.onchange = e => handleFile(e.target.files[0]);

  function handleFile(file) {
    if (!file) return;
    if (!['application/pdf','image/jpeg','image/png','image/jpg'].includes(file.type)) { showError('Format non supporté.'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      fileData = e.target.result.split(',')[1]; fileType = file.type;
      showError('');
      document.getElementById('fileInfo').innerHTML = `<div style="margin-top:1rem"><span class="file-pill">📎 ${file.name} · ${(file.size/1024).toFixed(0)} Ko <button class="remove-btn" onclick="removeFile()">✕</button></span></div>`;
      document.getElementById('btnAnalyze').disabled = false;
      document.getElementById('status').textContent = 'Fichier prêt — cliquez sur Calculer.';
    };
    reader.readAsDataURL(file);
  }

  function removeFile() {
    fileData = null; fileType = null;
    document.getElementById('fileInfo').innerHTML = '';
    document.getElementById('btnAnalyze').disabled = true;
    document.getElementById('status').textContent = '';
    document.getElementById('results').style.display = 'none';
    fileInput.value = '';
  }

  function showError(msg) { document.getElementById('errorMsg').textContent = msg; }

  async function analyze() {
    if (!fileData) return;
    const btn = document.getElementById('btnAnalyze');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>Analyse en cours…';
    document.getElementById('status').textContent = 'Claude lit la facture…';
    showError('');
    document.getElementById('results').style.display = 'none';

    const contentType = fileType === 'application/pdf' ? 'document' : 'image';

    const prompt = `Tu es un expert en analyse de factures pharmacie et en calcul de prix de revient.

OBJECTIF : Calculer le coût réel unitaire de chaque produit en répartissant UNIQUEMENT les frais annexes, sans retraiter les remises déjà intégrées.

RÈGLES STRICTES :
1. Les prix "Total HT" des lignes produits sont déjà NETS de remise. NE PAS retraiter ni répartir les remises.
2. Identifier uniquement les frais annexes à répartir : frais de compte, transport, frais logistiques, port, assurance, manutention. EXCLURE toute remise ou ligne négative liée à une réduction commerciale.
3. Répartir les frais UNIQUEMENT au prorata du poids HT de chaque ligne : Poids ligne = Total HT ligne / Somme des Total HT produits.
4. CONTRÔLES : Somme des frais répartis = total des frais annexes. Ne pas modifier les quantités. Ne pas inventer de lignes.

Réponds UNIQUEMENT en JSON valide, sans markdown, sans backticks, sans texte autour.

{
  "fournisseur": "",
  "numero_facture": "",
  "date": "",
  "devise": "EUR",
  "produits": [
    {
      "designation": "",
      "ean": "",
      "reference": "",
      "quantite": 1,
      "prix_unitaire_ht": 0.000,
      "total_ht": 0.000
    }
  ],
  "frais_annexes": [
    { "libelle": "", "montant": 0.00 }
  ],
  "remises_exclues": [
    { "libelle": "", "montant": 0.00 }
  ],
  "total_produits_ht": 0.00,
  "total_frais_annexes": 0.00,
  "total_facture_ht": 0.00
}

Sois précis sur les montants et les quantités — ne jamais les supposer.`;

    try {
      const resp = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: MODEL, max_tokens: 4000, messages: [{ role: 'user', content: [{ type: contentType, source: { type: 'base64', media_type: fileType, data: fileData } }, { type: 'text', text: prompt }] }] })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error?.message || 'Erreur API');
      const raw = data.content.map(b => b.text || '').join('');
      let inv;
      try { inv = JSON.parse(raw.replace(/```json|```/g, '').trim()); }
      catch(e) { throw new Error('Document illisible. Vérifiez la qualité du fichier.'); }
      const produits = inv.produits || [];
      if (!produits.length) throw new Error('Aucun produit détecté.');
      const frais = inv.frais_annexes || [];
      const totalFrais = inv.total_frais_annexes || frais.reduce((s, f) => s + (f.montant || 0), 0);
      const totalProduitsHT = inv.total_produits_ht || produits.reduce((s, p) => s + (p.total_ht || 0), 0);
      renderResults(inv, produits, frais, totalFrais, totalProduitsHT);
      document.getElementById('status').textContent = `✓ ${produits.length} produit(s) · ${frais.length} poste(s) de frais annexes`;
    } catch(e) {
      showError(e.message);
      document.getElementById('status').textContent = '';
    }
    btn.innerHTML = 'Calculer le prix net rendu';
    btn.disabled = false;
  }

  function fmt(n, d=2) { return (Math.round(n * 10000) / 10000).toFixed(d); }

  function renderResults(inv, produits, frais, totalFrais, totalProduitsHT) {
    const devise = inv.devise || '€';
    let totalNet = 0;
    let sumFraisRepartis = 0;

    // Meta
    const metaHTML = [
      inv.fournisseur    && { l: 'Fournisseur',   v: inv.fournisseur },
      inv.numero_facture && { l: 'N° facture',     v: inv.numero_facture },
      inv.date           && { l: 'Date',           v: inv.date },
                            { l: 'Devise',         v: devise },
    ].filter(Boolean).map(m => `<div class="meta-cell"><div class="meta-label">${m.l}</div><div class="meta-value">${m.v}</div></div>`).join('');

    // Frais annexes chips
    const fraisHTML = frais.length
      ? frais.map(f => `<span class="chip">${f.libelle} <span class="chip-amount">+${fmt(f.montant)} ${devise}</span></span>`).join('')
      : `<span class="no-frais-note">Aucun frais annexe détecté</span>`;

    // Remises exclues chips
    const remises = inv.remises_exclues || [];
    const remisesHTML = remises.length
      ? `<div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid var(--border)">
          <div class="section-label" style="margin-bottom:0.5rem">Remises exclues du calcul (déjà intégrées dans les prix HT)</div>
          <div class="frais-chips">${remises.map(r => `<span class="chip" style="color:var(--muted)">${r.libelle} <span style="font-family:var(--mono);color:#856404">${fmt(r.montant)} ${devise}</span></span>`).join('')}</div>
        </div>` : '';

    // Table rows
    let rows = '';
    produits.forEach(p => {
      const totalHT    = p.total_ht || 0;
      const poidsPct   = totalProduitsHT > 0 ? totalHT / totalProduitsHT : 0;
      const fraisLigne = totalFrais * poidsPct;
      const coutTotal  = totalHT + fraisLigne;
      const qty        = p.quantite || 1;
      const coutU      = coutTotal / qty;
      totalNet        += coutTotal;
      sumFraisRepartis += fraisLigne;

      rows += `<tr>
        <td>${p.designation || '—'}${p.reference ? `<div class="ref-text">${p.reference}</div>` : ''}</td>
        <td>${p.ean ? `<span class="ean-badge">${p.ean}</span>` : `<span style="color:var(--muted);font-size:11px">—</span>`}</td>
        <td class="td-r">${qty}</td>
        <td class="td-r" style="font-family:var(--mono)">${fmt(p.prix_unitaire_ht, 3)}</td>
        <td class="td-r" style="font-family:var(--mono)">${fmt(totalHT, 2)}</td>
        <td class="td-r pct-cell">${fmt(poidsPct * 100, 1)}%
          <div class="pct-bar-bg"><div class="pct-bar" style="width:${Math.min(poidsPct * 100, 100)}%"></div></div>
        </td>
        <td class="td-r" style="font-family:var(--mono);color:var(--muted)">+${fmt(fraisLigne, 3)}</td>
        <td class="td-r">
          <div class="net-val">${fmt(coutU, 3)} ${devise}</div>
          <div class="net-total">${fmt(coutTotal, 2)} total</div>
        </td>
      </tr>`;
    });

    // Contrôles
    const diffFrais = Math.abs(sumFraisRepartis - totalFrais);
    const ctrlFraisOk = diffFrais < 0.01;
    const ctrlFraisLabel = ctrlFraisOk
      ? `✓ Frais répartis = ${fmt(totalFrais, 2)} ${devise}`
      : `⚠ Écart frais : ${fmt(diffFrais, 3)} ${devise}`;

    const totalFactureHT = inv.total_facture_ht || 0;
    const diffTotal = totalFactureHT > 0 ? Math.abs(totalNet - totalFactureHT) : 0;
    const ctrlTotalOk = totalFactureHT === 0 || diffTotal < 0.05;
    const ctrlTotalLabel = totalFactureHT > 0
      ? (ctrlTotalOk ? `✓ Coût total = ${fmt(totalNet, 2)} ${devise}` : `⚠ Écart total : ${fmt(diffTotal, 3)} ${devise}`)
      : `Total facture non détecté`;

    const pctFrais = totalProduitsHT > 0 ? fmt(totalFrais / totalProduitsHT * 100, 2) : '0.00';

    document.getElementById('results').innerHTML = `
      <div class="section-label">Informations facture</div>
      <div class="invoice-meta">${metaHTML}</div>

      <div class="section-label">Frais annexes répartis</div>
      <div class="frais-box">
        <div class="frais-chips">${fraisHTML}</div>
        ${remisesHTML}
      </div>

      <div class="controls-row">
        <span class="ctrl-ok ${ctrlFraisOk ? 'ok' : 'warn'}">${ctrlFraisLabel}</span>
        <span class="ctrl-ok ${ctrlTotalOk ? 'ok' : 'warn'}">${ctrlTotalLabel}</span>
      </div>

      <div class="section-label">Détail par produit</div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Désignation</th><th>EAN</th>
          <th class="th-r">Qté</th><th class="th-r">PU HT net</th>
          <th class="th-r">Total HT net</th><th class="th-r">Poids %</th>
          <th class="th-r">Frais répartis</th><th class="th-r">Coût réel / u</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <p class="note">Frais répartis au prorata du montant HT · Remises non retraitées</p>

      <div class="summary-grid">
        <div class="sum-card"><div class="sum-label">Total produits HT net</div><div class="sum-value">${fmt(totalProduitsHT, 2)} ${devise}</div></div>
        <div class="sum-card"><div class="sum-label">Total frais annexes</div><div class="sum-value">${fmt(totalFrais, 2)} ${devise}</div></div>
        <div class="sum-card"><div class="sum-label">Coût réel total</div><div class="sum-value accent">${fmt(totalNet, 2)} ${devise}</div></div>
        <div class="sum-card"><div class="sum-label">% frais / HT</div><div class="sum-value">${pctFrais}%</div></div>
      </div>
    `;
    document.getElementById('results').style.display = 'block';
  }
</script>
</body>
</html>
